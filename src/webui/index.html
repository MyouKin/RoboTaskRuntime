<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RoboTaskRuntime</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>RoboTaskRuntime</h1>
        <span id="statusBadge" class="badge">Idle</span>
      </div>
      <nav class="controls">
        <button data-command="run">Run</button>
        <button data-command="pause">Pause</button>
        <button data-command="resume">Resume</button>
        <button data-command="stop">Stop</button>
        <button data-command="shutdown" class="danger">Shutdown</button>
      </nav>
    </header>

    <div class="toolbar">
      <select id="panelType">
        <option value="chart">Debug Curves</option>
        <option value="image">Debug Image</option>
        <option value="values">Debug Values</option>
        <option value="params">Parameters</option>
        <option value="logs">Logs</option>
        <option value="system">System</option>
      </select>
      <button id="addPanel">Add Panel</button>
      <button id="resetLayout">Reset Layout</button>
    </div>

    <main id="dashboard" class="dashboard"></main>

    <script src="/app.js"></script>
  </body>
</html>
